<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FBA Calc" />

  <title>FBA Calc · Amazon España</title>

  <style>
    :root {
      --black: #050505;
      --black-soft: #0d0d0f;
      --card: rgba(255, 255, 255, 0.075);
      --card-strong: rgba(255, 255, 255, 0.12);
      --white: #ffffff;
      --muted: #a7a7a7;
      --muted-soft: #717171;
      --orange: #ff6a00;
      --orange-light: #ff9a3d;
      --green: #22c55e;
      --yellow: #facc15;
      --red: #ef4444;
      --blue: #60a5fa;
      --line: rgba(255,255,255,0.13);
      --shadow: 0 28px 80px rgba(0,0,0,0.5);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at top left, rgba(255,106,0,0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,106,0,0.16), transparent 35%),
        linear-gradient(145deg, #050505 0%, #111115 55%, #050505 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px 14px;
    }

    .app {
      width: 100%;
      max-width: 430px;
    }

    .phone-card {
      position: relative;
      overflow: hidden;
      border-radius: 36px;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.045)),
        rgba(8,8,10,0.88);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .phone-card::before {
      content: "";
      position: absolute;
      top: -110px;
      right: -80px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255,106,0,0.45), transparent 68%);
      pointer-events: none;
    }

    .header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      display: grid;
      place-items: center;
      color: #111;
      font-weight: 950;
      font-size: 15px;
      letter-spacing: -0.8px;
      box-shadow: 0 14px 35px rgba(255,106,0,0.36);
    }

    .brand-text h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1;
      letter-spacing: -0.9px;
    }

    .brand-text p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .tag {
      padding: 8px 11px;
      border-radius: 999px;
      color: #ffd7bd;
      border: 1px solid rgba(255,106,0,0.38);
      background: rgba(255,106,0,0.12);
      font-size: 12px;
      font-weight: 800;
    }

    .inputs {
      position: relative;
      display: grid;
      gap: 13px;
      margin-bottom: 18px;
    }

    .input-box {
      border-radius: 24px;
      padding: 15px 16px 13px;
      background: rgba(255,255,255,0.065);
      border: 1px solid rgba(255,255,255,0.12);
      transition: all 0.2s ease;
    }

    .input-box:focus-within {
      transform: translateY(-1px);
      border-color: rgba(255,106,0,0.85);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 12px 30px rgba(255,106,0,0.12);
    }

    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .mini {
      color: var(--orange-light);
      font-size: 11px;
      font-weight: 900;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--white);
      font-size: 27px;
      font-weight: 900;
      letter-spacing: -0.8px;
      padding: 0;
      appearance: none;
    }

    input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .euro {
      color: var(--orange-light);
      font-size: 21px;
      font-weight: 950;
    }

    .result-card {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      padding: 19px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.13), rgba(255,255,255,0.065));
      border: 1px solid rgba(255,255,255,0.14);
      transition: all 0.25s ease;
    }

    .result-card.green {
      border-color: rgba(34,197,94,0.55);
      box-shadow: 0 0 0 1px rgba(34,197,94,0.12), 0 18px 50px rgba(34,197,94,0.13);
    }

    .result-card.yellow {
      border-color: rgba(250,204,21,0.55);
      box-shadow: 0 0 0 1px rgba(250,204,21,0.12), 0 18px 50px rgba(250,204,21,0.10);
    }

    .result-card.orange {
      border-color: rgba(255,106,0,0.55);
      box-shadow: 0 0 0 1px rgba(255,106,0,0.12), 0 18px 50px rgba(255,106,0,0.12);
    }

    .result-card.red {
      border-color: rgba(239,68,68,0.58);
      box-shadow: 0 0 0 1px rgba(239,68,68,0.12), 0 18px 50px rgba(239,68,68,0.14);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 950;
      margin-bottom: 16px;
      background: rgba(255,255,255,0.14);
      color: var(--muted);
    }

    .status.green {
      color: #06140b;
      background: var(--green);
    }

    .status.yellow {
      color: #171200;
      background: var(--yellow);
    }

    .status.orange {
      color: #180900;
      background: var(--orange-light);
    }

    .status.red {
      color: #fff;
      background: var(--red);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.8;
    }

    .profit {
      margin: 0;
      font-size: 42px;
      line-height: 0.95;
      letter-spacing: -1.8px;
      font-weight: 1000;
    }

    .profit.negative {
      color: #ff8e8e;
    }

    .summary {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
      font-weight: 650;
    }

    .summary strong {
      color: var(--white);
    }

    .meter {
      margin-top: 17px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.11);
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--orange);
      transition: width 0.35s ease, background 0.35s ease;
    }

    .breakdown {
      display: grid;
      gap: 8px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.11);
      font-size: 12px;
      color: var(--muted);
    }

    .break-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .break-row span:last-child {
      color: rgba(255,255,255,0.9);
      font-weight: 850;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 15px 16px;
      color: #111;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(255,106,0,0.25);
    }

    button:active {
      transform: scale(0.985);
    }

    .note {
      margin: 14px 5px 0;
      text-align: center;
      color: rgba(255,255,255,0.42);
      font-size: 11.5px;
      line-height: 1.35;
      font-weight: 600;
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      color: rgba(255,255,255,0.32);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    @media (max-width: 370px) {
      .phone-card {
        padding: 20px;
        border-radius: 30px;
      }

      .profit {
        font-size: 37px;
      }

      input {
        font-size: 24px;
      }

      .brand-text h1 {
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="phone-card">
      <header class="header">
        <div class="brand">
          <div class="logo">FBA</div>
          <div class="brand-text">
            <h1>FBA Calc</h1>
            <p>Rentabilidad rápida para Amazon España</p>
          </div>
        </div>
        <div class="tag">PRO</div>
      </header>

      <section class="inputs">
        <div class="input-box">
          <label for="coste">
            Coste puesto en España
            <span class="mini">COMPRA + ENVÍO</span>
          </label>
          <div class="input-row">
            <input id="coste" inputmode="decimal" autocomplete="off" placeholder="Ej: 12" />
            <span class="euro">€</span>
          </div>
        </div>

        <div class="input-box">
          <label for="venta">
            Precio venta Amazon
            <span class="mini">PVP</span>
          </label>
          <div class="input-row">
            <input id="venta" inputmode="decimal" autocomplete="off" placeholder="Ej: 29,99" />
            <span class="euro">€</span>
          </div>
        </div>

        <div class="input-box">
          <label for="fba">
            Envío FBA Amazon
            <span class="mini">EDITABLE</span>
          </label>
          <div class="input-row">
            <input id="fba" inputmode="decimal" autocomplete="off" value="4,50" />
            <span class="euro">€</span>
          </div>
        </div>
      </section>

      <section class="result-card" id="resultCard">
        <div class="status" id="status">
          <span class="dot"></span>
          Esperando datos
        </div>

        <h2 class="profit" id="profit">—</h2>

        <p class="summary" id="summary">
          Introduce los datos para calcular.
        </p>

        <div class="meter">
          <div class="meter-fill" id="meterFill"></div>
        </div>

        <div class="breakdown" id="breakdown" style="display:none;">
          <div class="break-row">
            <span>IVA venta 21%</span>
            <span id="ivaOut">—</span>
          </div>
          <div class="break-row">
            <span>Comisión Amazon 15%</span>
            <span id="commissionOut">—</span>
          </div>
          <div class="break-row">
            <span>Envío FBA</span>
            <span id="fbaOut">—</span>
          </div>
        </div>
      </section>

      <div class="button-row">
        <button id="clearBtn">Limpiar</button>
      </div>

      <p class="note">
        Estimación con IVA 21%, comisión Amazon 15% y envío FBA editable.
      </p>
    </section>

    <div class="footer">
      Calculadora privada · Amazon FBA
    </div>
  </main>

  <script>
    const costeInput = document.getElementById("coste");
    const ventaInput = document.getElementById("venta");
    const fbaInput = document.getElementById("fba");

    const resultCard = document.getElementById("resultCard");
    const statusEl = document.getElementById("status");
    const profitEl = document.getElementById("profit");
    const summaryEl = document.getElementById("summary");
    const meterFill = document.getElementById("meterFill");
    const breakdown = document.getElementById("breakdown");

    const ivaOut = document.getElementById("ivaOut");
    const commissionOut = document.getElementById("commissionOut");
    const fbaOut = document.getElementById("fbaOut");

    const clearBtn = document.getElementById("clearBtn");

    function parseNumber(value) {
      if (!value) return NaN;
      return Number(String(value).replace(/\s/g, "").replace(",", "."));
    }

    function formatEuro(value) {
      return value.toLocaleString("es-ES", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }) + " €";
    }

    function formatPercent(value) {
      return value.toLocaleString("es-ES", {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
      }) + "%";
    }

    function cleanClasses() {
      resultCard.className = "result-card";
      statusEl.className = "status";
      profitEl.className = "profit";
    }

    function setState(color, text) {
      cleanClasses();

      if (color) {
        resultCard.classList.add(color);
        statusEl.classList.add(color);
      }

      statusEl.innerHTML = '<span class="dot"></span>' + text;
    }

    function calculate() {
      const coste = parseNumber(costeInput.value);
      const venta = parseNumber(ventaInput.value);
      const fba = parseNumber(fbaInput.value);

      localStorage.setItem("fba_coste", costeInput.value);
      localStorage.setItem("fba_venta", ventaInput.value);
      localStorage.setItem("fba_envio", fbaInput.value);

      if (isNaN(coste) || isNaN(venta) || isNaN(fba) || venta <= 0) {
        setState("", "Esperando datos");
        profitEl.textContent = "—";
        summaryEl.textContent = "Introduce los datos para calcular.";
        meterFill.style.width = "0%";
        meterFill.style.background = "var(--orange)";
        breakdown.style.display = "none";
        return;
      }

      const iva = venta * 0.21;
      const commission = venta * 0.15;
      const profit = venta - iva - commission - fba - coste;
      const margin = (profit / venta) * 100;

      let color = "red";
      let text = "No rentable";

      if (margin >= 20) {
        color = "green";
        text = "Rentable";
      } else if (margin >= 15) {
        color = "yellow";
        text = "Aceptable";
      } else if (margin >= 10) {
        color = "orange";
        text = "Muy justo";
      } else {
        color = "red";
        text = "No rentable";
      }

      setState(color, text);

      if (profit < 0) {
        profitEl.classList.add("negative");
      }

      profitEl.textContent = formatEuro(profit);

      if (profit >= 0) {
        summaryEl.innerHTML =
          "Ganas <strong>" + formatEuro(profit) + "</strong> por unidad · Margen neto: <strong>" + formatPercent(margin) + "</strong>";
      } else {
        summaryEl.innerHTML =
          "Pierdes <strong>" + formatEuro(Math.abs(profit)) + "</strong> por unidad · Margen neto: <strong>" + formatPercent(margin) + "</strong>";
      }

      let width = Math.max(0, Math.min(margin, 30)) / 30 * 100;
      meterFill.style.width = width + "%";

      if (color === "green") meterFill.style.background = "var(--green)";
      if (color === "yellow") meterFill.style.background = "var(--yellow)";
      if (color === "orange") meterFill.style.background = "var(--orange-light)";
      if (color === "red") meterFill.style.background = "var(--red)";

      ivaOut.textContent = formatEuro(iva);
      commissionOut.textContent = formatEuro(commission);
      fbaOut.textContent = formatEuro(fba);
      breakdown.style.display = "grid";
    }

    [costeInput, ventaInput, fbaInput].forEach(input => {
      input.addEventListener("input", calculate);
      input.addEventListener("focus", () => input.select());
    });

    clearBtn.addEventListener("click", () => {
      costeInput.value = "";
      ventaInput.value = "";
      fbaInput.value = "4,50";

      localStorage.removeItem("fba_coste");
      localStorage.removeItem("fba_venta");
      localStorage.setItem("fba_envio", "4,50");

      calculate();
      costeInput.focus();
    });

    window.addEventListener("load", () => {
      const savedCoste = localStorage.getItem("fba_coste");
      const savedVenta = localStorage.getItem("fba_venta");
      const savedEnvio = localStorage.getItem("fba_envio");

      if (savedCoste !== null) costeInput.value = savedCoste;
      if (savedVenta !== null) ventaInput.value = savedVenta;
      if (savedEnvio !== null) fbaInput.value = savedEnvio || "4,50";

      calculate();
    });
  </script>
</body>
</html>
